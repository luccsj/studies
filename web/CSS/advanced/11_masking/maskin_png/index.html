<html>
<head>
  <title>Masking Example</title>
  <style>
    .mask {
      -webkit-mask-image: url('Star_wars2.png');
      mask-image: url('Star_wars2.png');
      mask-repeat: no-repeat;
      mask-position: center;
    }
  </style>
</head>
<body>
  <div>
    <img class="mask" src="image1.jpg" alt="Example Image" width="600" height="400">
  </div>
</body>
</html>
