<html>
    <head>
        <title>
            Align com CSS
        </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="box-center" id="box-center">Box 1</div>
            <div class="box-left" id="box-left">Box 2</div>
            <div class="box-right" id="box-right">Box 3</div>
        </div>
        <div class="buttons">
                <button onclick="toggleBoxeLeft()">Mostrar e Ocultar Box 2</button>
                <button onclick="toggleBoxeCenter()">Mostrar e Ocultar Box 1</button>
                <button onclick="toggleBoxeRight()">Mostrar e Ocultar Box 3</button>
        </div>
        <script>
            function toggleBoxeLeft() {
                const container = document.getElementById('box-left');
                container.style.display = container.style.display === 'none' ? 'flex' : 'none';
            }
            function toggleBoxeCenter() {
                const container = document.getElementById('box-center');
                container.style.display = container.style.display === 'none' ? 'flex' : 'none';
            }
            function toggleBoxeRight() {
                const container = document.getElementById('box-right');
                container.style.display = container.style.display === 'none' ? 'flex' : 'none';
            }
        </script>
    </body>
</html>
