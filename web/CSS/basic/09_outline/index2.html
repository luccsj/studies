<!DOCTYPE html>
<html>
<head>
<style>
p {
  padding: 5px;
  outline-style: solid;
  outline-color: green;
}

p.ex1 {outline-width: thin;}

p.ex2 {outline-width: medium;}

p.ex3 {outline-width: thick;}

p.ex4 {outline-width: 8px;}
</style>
</head>
<body>

<h2>A Propriedade outline-width</h2>

<p class="ex1">Um contorno fino.</p>
<p class="ex2">Um contorno médio.</p>
<p class="ex3">Um contorno grosso.</p>
<p class="ex4">Um contorno de 8px de espessura.</p>

</body>
</html>
