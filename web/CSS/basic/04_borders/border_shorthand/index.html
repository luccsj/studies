<html>
    <head>
        <title>Border Shorthand</title>
    </head>
    <body>
        <h1>Border Shorthand</h1>
        <p style="border: 2px solid black;">esse é um parágrafo com borda</p>
        <p style="border-left: 6px solid red;">esse é um parágrafo com borda à esquerda</p>
        <p style="border-right: 6px solid blue;">esse é um parágrafo com borda à direita</p>
        <p style="border-top: 6px solid green;">esse é um parágrafo com borda à cima</p>    
        <p style="border-bottom: 6px solid orange;">esse é um parágrafo com borda à baixo</p>
    </body>
</html>
