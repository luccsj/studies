<html>
    <head>
        <title>propriedades de exibição</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>propriedades de exibição</h1>

        <h1>display: none:</h1>
        <p class="ex1">
            <span>texto1</span>
            <span>texto2</span>
            <span>texto3</span>
        </p>

        <h1>display: block:</h1>
        <p class="ex2">
            <span>texto1</span>
            <span>texto2</span>
            <span>texto3</span>
        </p>

        <h1>display: inline:</h1>
        <p class="ex3">
            <span>texto1</span>
            <span>texto2</span>
            <span>texto3</span>
        </p>
        
        <h1>display: inline-block:</h1>
        <p class="ex4">
            <span>texto1</span>
            <span>texto2</span>
            <span>texto3</span>
        </p>

        <h1>display: flex:</h1>
        <p class="ex5">
            <span>texto1</span>
            <span>texto2</span>
            <span>texto3</span>
        </p>

        <h1>display: grid:</h1>
        <p class="ex6">
            <span>texto1</span>
            <span>texto2</span>
            <span>texto3</span>
        </p>
    </body>
</html>
