<html>
    <head>
        <title>
            Posicionamento com CSS
        </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="relative">
            <p>Este é um elemento posicionado relativamente.</p>
        </div>
        <div class="absolute">
            <p>Este é um elemento posicionado absolutamente.</p>
        </div>
        <div class="fixed">
            <p>Este é um elemento posicionado fixamente.</p>
        </div>
        <div class="sticky">
            <p>Este é um elemento posicionado sticky.</p>
        </div>
    </body>
</html>
