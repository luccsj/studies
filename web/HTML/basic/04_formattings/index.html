<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>
<!-- <b> Bold é um elemento que formata o texto em negrito. -->
<b> Bold </b><br>
<!-- <strong> Strong é utilizada para notar um texto importante. -->
<strong> Texto importante! </strong> <br>
<!-- <em> elemento utilizado para emfatizar um texto. -->
<em> Texto enfátizado. </em> <br>
<!-- <i> elemento utilizado para formatar texto em Itálico. -->
<i> Itálico </i> <br>
<!-- <small> elemento que define texto pequeno. -->
<small> Texto pequeno </small> <br>
<!-- <mark> define qual texto deve ser marcado ou destacado. -->
<mark> Texto que deve ser destacado. </mark> <br>
<!-- <del> apaga texto que dever ser excluido sem modificar o código todo -->
<b> Minha cor favorita é: <del>Preto</del> Azul </b> <br>
<!-- <sub> elemento para texto subscrito. -->
H<sub>2</sub>O
<!-- <sup> elemento para texto subrecrito. -->
<sup>WWW</sup>
</body>
</html>
