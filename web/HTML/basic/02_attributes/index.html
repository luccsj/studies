<!DOCTYPE html>
<!-- "lang" é um tributo da Tag <html> para declarar a linguagem da pagina web.-->
<html lang="pt-br">
<!------------------------------------------------------------------------------->
<head> 
<meta charset="utf-8">
<title> Atributos </title>
</head>
<body>
<!-- "align" é um atributo que permite centralizar algo na página. -->
<h1 align="center"> Veja o código-fonte :) </h1>
<!-- "href" é atributo do <a> e direciona uma URL que deseja linkar na página. -->
<a href=""></a>
<!-- "src" é atributo do <img> e direciona uma imagem salva na pasta para a página. -->
<img src="">
<!-- "height" e "width" é atributo do <img> e fornece o tamanho e largura da imagem. -->
<img src="" width="" height="">
<!-- "alt" é atributo do <img> e fornece um texto alternativo na imagem.-->
<img src="" alt="">
<!-- "style" é um atributo utilizado para personalização de fontes, cores, tamanho e outros. -->
<img src="" style="">
</body>
</html>
