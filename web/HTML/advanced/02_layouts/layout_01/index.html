<body>
    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
            }
            header {
                background-color: #333;
                color: white;
                padding: 20px;
            }
            nav {
                background-color: #f4f4f4;
                padding: 10px;
            }
            nav ul {
                list-style-type: none;
                padding: 0;
            }
            nav ul li {
                display: inline;
                padding-left: 15em;
                margin-right: 10px;
            }
            nav ul li a {
                text-decoration: none;
                color: #333;
            }
            article {
                background-color: aquamarine;
                height: 23em;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1 align="center">Meu Site</h1>
        </header>
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
            <article>
                <h2>Bem-vindo ao Meu Site</h2>
                <p>Este é um layout simples para um site básico.</p>
            </article>
        <footer>
            <p align="center">&copy; 2023 Meu Site. Todos os direitos reservados.</p>
        </footer>
    </body>
    </html>
